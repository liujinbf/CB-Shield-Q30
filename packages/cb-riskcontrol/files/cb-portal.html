<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CB-Shield Pro 落地页</title>
    <style>
        :root {
            --primary: #0a4fa5;
            --accent: #1f8fff;
            --bg: #f5f8fc;
            --text: #1f2937;
            --subtext: #4b5563;
            --card: #ffffff;
        }
        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        .hero {
            background: linear-gradient(120deg, var(--primary), var(--accent));
            color: #fff;
            padding: 48px 20px;
            text-align: center;
        }
        .hero h1 {
            margin: 0 0 12px;
            font-size: 32px;
        }
        .hero p {
            margin: 0;
            font-size: 16px;
            opacity: 0.95;
        }
        .container {
            max-width: 980px;
            margin: 28px auto;
            padding: 0 16px 24px;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
        }
        .card {
            background: var(--card);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.06);
            padding: 18px;
        }
        .card h3 {
            margin: 0 0 8px;
            font-size: 17px;
            color: var(--primary);
        }
        .card p {
            margin: 0;
            color: var(--subtext);
            line-height: 1.6;
            font-size: 14px;
        }
        .footer {
            text-align: center;
            color: var(--subtext);
            font-size: 13px;
            margin-top: 18px;
        }
    </style>
</head>
<body>
    <section class="hero">
        <h1>CB-Shield Pro</h1>
        <p>跨境网络安全与业务稳定性增强平台</p>
    </section>

    <main class="container">
        <div class="cards">
            <article class="card">
                <h3>风险检测</h3>
                <p>周期检测出口 IP 风险等级，自动输出状态并联动处置策略。</p>
            </article>
            <article class="card">
                <h3>线路保护</h3>
                <p>线路异常时触发防泄漏策略，降低业务裸连和封禁风险。</p>
            </article>
            <article class="card">
                <h3>多 WiFi 隔离</h3>
                <p>店铺网络按接口隔离，支持逐个开关与状态可视化。</p>
            </article>
            <article class="card">
                <h3>运营支持</h3>
                <p>可通过云端配置下发跳转地址、公告与联系信息。</p>
            </article>
        </div>
        <p class="footer">CB-Shield Q30 | Powered by OpenWrt</p>
    </main>
</body>
</html>
