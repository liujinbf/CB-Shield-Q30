# ============================================================
# CB-Shield-Q30 风控 UCI 配置
# ============================================================

config main 'main'
    # 是否启用风控 (0=禁用, 1=启用)
    option enabled '1'

    # 检测间隔 (秒)
    option check_interval '300'

    # 风险阈值 (0-100, 超过此分数执行动作)
    option risk_threshold '70'

    # 高风险时执行的动作
    # warn          - 仅记录告警日志
    # disconnect    - 断开并重连 WAN
    # switch_proxy  - 切换 Passwall 代理节点
    option action 'warn'

    # API 提供商
    option api_provider 'ip-api'
