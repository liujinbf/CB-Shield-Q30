<%+header%>

<link rel="stylesheet" href="/luci-static/cbshield/css/style.css" type="text/css" />

<div class="cb-dashboard">
    <div class="cb-page-header">
        <h1>网络状态</h1>
        <p class="cb-subtitle">查看单网络双频状态、出口代理运行情况与在线客户端数量。</p>
    </div>

    <div class="cb-section">
        <h2>基础接口</h2>
        <div class="cb-cards-row" id="iface-cards">
            <div class="cb-card cb-card-loading"><p>加载中...</p></div>
        </div>
    </div>

    <div class="cb-section">
        <h2>无线网络</h2>
        <div class="cb-cards-row" id="wifi-cards">
            <div class="cb-card cb-card-loading"><p>加载中...</p></div>
        </div>
    </div>

    <div class="cb-section">
        <h2>代理与客户端</h2>
        <div class="cb-cards-row" id="extra-cards">
            <div class="cb-card cb-card-loading"><p>加载中...</p></div>
        </div>
    </div>
</div>

<script>
function readableServiceName(name) {
    if (!name || name === "none") return "未安装";
    if (name === "openclash") return "OpenClash";
    if (name === "passwall") return "Passwall";
    return name;
}

function loadNetworkStatus() {
    fetch("/cgi-bin/luci/admin/cbshield/api/network")
        .then(function(response) { return response.json(); })
        .then(function(data) {
            renderInterfaces(data.interfaces || []);
            renderWifi(data.wifi || []);
            renderExtras(data.proxy || {}, data.total_clients || 0);
        })
        .catch(function(error) {
            console.error("failed to load network status:", error);
        });
}

function renderInterfaces(interfaces) {
    var container = document.getElementById("iface-cards");
    if (!container) return;

    if (!interfaces.length) {
        container.innerHTML = "<div class=\"cb-card\"><p class=\"cb-detail\">暂无接口数据</p></div>";
        return;
    }

    var html = "";
    interfaces.forEach(function(iface) {
        html += "<div class=\"cb-card\">";
        html += "  <h3>" + iface.name.toUpperCase() + "</h3>";
        html += "  <p class=\"cb-detail\">状态: " + (iface.up ? "在线" : "离线") + "</p>";
        html += "  <p class=\"cb-detail\">IP: " + (iface.ip || "--") + "</p>";
        html += "  <p class=\"cb-detail\">RX " + (iface.rx_human || "--") + " / TX " + (iface.tx_human || "--") + "</p>";
        html += "</div>";
    });
    container.innerHTML = html;
}

function renderWifi(items) {
    var container = document.getElementById("wifi-cards");
    if (!container) return;

    if (!items.length) {
        container.innerHTML = "<div class=\"cb-card\"><p class=\"cb-detail\">暂无无线数据</p></div>";
        return;
    }

    var html = "";
    items.forEach(function(item) {
        html += "<div class=\"cb-card\">";
        html += "  <h3>" + (item.title || item.id) + "</h3>";
        html += "  <p class=\"cb-detail\">频段: " + (item.band || "--") + "</p>";
        html += "  <p class=\"cb-detail\">SSID: " + (item.ssid || "--") + "</p>";
        html += "  <p class=\"cb-detail\">状态: " + (item.enabled ? "启用" : "禁用") + "</p>";
        html += "  <p class=\"cb-detail\">网络: " + (item.network || "--") + "</p>";
        html += "  <p class=\"cb-detail\">加密: " + (item.encryption || "--") + "</p>";
        html += "</div>";
    });
    container.innerHTML = html;
}

function renderExtras(proxy, clients) {
    var container = document.getElementById("extra-cards");
    if (!container) return;

    var proxyName = readableServiceName(proxy.service);
    var html = "";
    html += "<div class=\"cb-card\">";
    html += "  <h3>代理服务</h3>";
    html += "  <p class=\"cb-value-text\">" + proxyName + "</p>";
    html += "  <p class=\"cb-detail\">状态: " + (proxy.running ? "运行中" : "未运行") + "</p>";
    html += "</div>";
    html += "<div class=\"cb-card\">";
    html += "  <h3>在线客户端</h3>";
    html += "  <p class=\"cb-value-text\">" + clients + "</p>";
    html += "  <p class=\"cb-detail\">通过 ARP 记录估算当前在线设备</p>";
    html += "</div>";
    container.innerHTML = html;
}

document.addEventListener("DOMContentLoaded", loadNetworkStatus);
setInterval(loadNetworkStatus, 10000);
</script>

<%+footer%>
