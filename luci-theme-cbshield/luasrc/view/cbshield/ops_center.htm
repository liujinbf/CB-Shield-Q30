<%+header%>

<link rel="stylesheet" href="/luci-static/cbshield/css/style.css" type="text/css" />

<div class="cb-dashboard">
    <div class="cb-page-header">
        <h1>运维中心</h1>
        <p class="cb-subtitle">查看健康检查、高可用监控、DNS 防泄漏和升级前检查结果。</p>
    </div>

    <div class="cb-section">
        <h2>服务健康状态</h2>
        <div class="cb-cards-row" id="health-cards">
            <div class="cb-card cb-card-loading"><p>加载中...</p></div>
        </div>
        <div style="margin-top:10px;">
            <button class="cb-btn cb-btn-secondary" onclick="refreshOps(true)">立即自检</button>
        </div>
    </div>

    <div class="cb-section">
        <h2>安全升级检查</h2>
        <div class="cb-form-panel">
            <div class="cb-form-row">
                <label>镜像路径</label>
                <input id="upgrade-image" class="cbi-input-text" type="text" value="/tmp/firmware.bin" style="min-width:360px;">
            </div>
            <div class="cb-form-row">
                <label>SHA256(可选)</label>
                <input id="upgrade-sha" class="cbi-input-text" type="text" value="" style="min-width:360px;">
            </div>
            <div class="cb-form-row">
                <button class="cb-btn cb-btn-primary" onclick="runUpgradeCheck()">执行检查</button>
            </div>
            <pre id="upgrade-result" style="background:#0f172a;color:#d1e7ff;padding:10px;border-radius:10px;overflow:auto;max-height:260px;">{}</pre>
        </div>
    </div>
</div>

<script>
function healthBadge(ok) {
    return ok
        ? "<span class=\"cb-badge cb-badge-success\">正常</span>"
        : "<span class=\"cb-badge cb-badge-danger\">异常</span>";
}

function readableServiceName(name) {
    if (!name || name === "none") return "未安装";
    if (name === "openclash") return "OpenClash";
    if (name === "passwall") return "Passwall";
    return name;
}

function renderHealth(health, ha, dns) {
    var box = document.getElementById("health-cards");
    if (!box) return;

    var proxy = health.proxy || {};
    var risk = health.riskcontrol || {};
    var portal = health.portal || {};
    var wifi = health.wifi || {};
    var html = "";

    html += "<div class=\"cb-card\"><h3>整体健康</h3><p class=\"cb-value-text\">" + (health.overall || "--") + "</p></div>";
    html += "<div class=\"cb-card\"><h3>代理服务</h3><p>" + healthBadge(proxy.running) + "</p><p class=\"cb-detail\">" + readableServiceName(proxy.service) + " / " + (proxy.action || "--") + "</p></div>";
    html += "<div class=\"cb-card\"><h3>风控守护</h3><p>" + healthBadge(risk.running) + "</p><p class=\"cb-detail\">" + (risk.action || "--") + "</p></div>";
    html += "<div class=\"cb-card\"><h3>Portal</h3><p>" + healthBadge(portal.running) + "</p><p class=\"cb-detail\">" + (portal.action || "--") + "</p></div>";
    html += "<div class=\"cb-card\"><h3>无线健康</h3><p>" + healthBadge(wifi.healthy) + "</p><p class=\"cb-detail\">" + (wifi.action || "--") + "</p></div>";
    html += "<div class=\"cb-card\"><h3>HA 状态</h3><p class=\"cb-value-text\">" + (ha.health || "--") + "</p><p class=\"cb-detail\">" + (ha.note || "--") + "</p></div>";
    html += "<div class=\"cb-card\"><h3>DNS 防泄漏</h3><p class=\"cb-value-text\">" + (dns.health || "--") + "</p><p class=\"cb-detail\">" + (dns.note || "--") + "</p></div>";

    box.innerHTML = html;
}

function refreshOps(runNow) {
    var request = function(url) {
        if (!runNow) {
            return fetch(url).then(function(response) { return response.json(); });
        }

        return fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "run=1"
        }).then(function(response) { return response.json(); });
    };

    Promise.all([
        request("/cgi-bin/luci/admin/cbshield/api/health"),
        request("/cgi-bin/luci/admin/cbshield/api/ha_status"),
        request("/cgi-bin/luci/admin/cbshield/api/dns_status")
    ]).then(function(data) {
        renderHealth(data[0] || {}, data[1] || {}, data[2] || {});
    }).catch(function(error) {
        console.error("ops refresh failed", error);
    });
}

function runUpgradeCheck() {
    var image = document.getElementById("upgrade-image").value;
    var sha = document.getElementById("upgrade-sha").value;
    var params = new URLSearchParams();
    params.append("image", image);
    if (sha) params.append("sha256", sha);

    fetch("/cgi-bin/luci/admin/cbshield/api/upgrade_check", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: params
    }).then(function(response) { return response.json(); })
      .then(function(data) {
          document.getElementById("upgrade-result").textContent = JSON.stringify(data, null, 2);
      })
      .catch(function(error) {
          document.getElementById("upgrade-result").textContent = JSON.stringify({ error: String(error) }, null, 2);
      });
}

document.addEventListener("DOMContentLoaded", function() {
    refreshOps(false);
});
</script>

<%+footer%>
