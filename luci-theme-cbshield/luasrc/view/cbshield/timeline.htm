<%+header%>

<link rel="stylesheet" href="/luci-static/cbshield/css/style.css" type="text/css" />

<div class="cb-dashboard">
    <div class="cb-page-header">
        <h1>事件时间线</h1>
        <p class="cb-subtitle">查看掉线、自检、风控动作、代理重启和升级检查等事件记录。</p>
    </div>

    <div class="cb-section">
        <h2>最近事件</h2>
        <div class="cb-form-panel">
            <div style="margin-bottom:10px;">
                <button class="cb-btn cb-btn-secondary" onclick="loadEvents()">刷新</button>
            </div>
            <div id="timeline-list" style="max-height:560px;overflow:auto;"></div>
        </div>
    </div>
</div>

<script>
function loadEvents() {
    fetch("/cgi-bin/luci/admin/cbshield/api/events")
        .then(function(response) { return response.json(); })
        .then(function(data) {
            var list = document.getElementById("timeline-list");
            if (!list) return;

            var events = (data && data.events) || [];
            if (!events.length) {
                list.innerHTML = "<p class=\"cb-detail\">暂无事件</p>";
                return;
            }

            var html = "";
            events.reverse().forEach(function(item) {
                html += "<div class=\"cb-card\" style=\"margin-bottom:10px;\">";
                html += "  <h3>" + (item.type || "event") + "</h3>";
                html += "  <p class=\"cb-detail\">" + (item.timestamp || "--") + "</p>";
                html += "  <p>" + (item.message || "") + "</p>";
                html += "</div>";
            });
            list.innerHTML = html;
        })
        .catch(function(error) {
            console.error("load events failed", error);
        });
}

document.addEventListener("DOMContentLoaded", loadEvents);
setInterval(loadEvents, 15000);
</script>

<%+footer%>
