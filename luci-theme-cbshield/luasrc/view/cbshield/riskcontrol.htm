<%+header%>

<link rel="stylesheet" href="/luci-static/cbshield/css/style.css" type="text/css" />
<script src="/luci-static/cbshield/js/theme.js"></script>

<div class="cb-dashboard">
    <div class="cb-page-header">
        <h1>IP 风控中心</h1>
        <p class="cb-subtitle">查看当前出口 IP 风险等级、代理服务状态，并支持手动执行检测。</p>
    </div>

    <div class="cb-section">
        <h2>风控运行状态</h2>
        <div class="cb-form-panel">
            <div class="cb-form-row">
                <label>服务状态</label>
                <span class="cb-badge" id="rc-service-status">检测中...</span>
            </div>
            <div class="cb-form-row">
                <label>代理服务</label>
                <span id="rc-proxy-service">--</span>
            </div>
            <div class="cb-form-row">
                <label>检测间隔</label>
                <span id="rc-interval">--</span> 秒
            </div>
            <div class="cb-form-row">
                <label>风险阈值</label>
                <span id="rc-threshold">--</span> 分
            </div>
            <div class="cb-form-row">
                <label>触发动作</label>
                <span id="rc-action">--</span>
            </div>
            <div class="cb-form-row">
                <button id="btn-runcheck" class="cb-btn cb-btn-primary" onclick="manualCheck()">立即检测</button>
                <button class="cb-btn cb-btn-secondary" onclick="refreshStatus()">刷新状态</button>
                <a class="cb-btn cb-btn-secondary" href="javascript:void(0)" onclick="window.open('http://' + window.location.hostname + ':8080/')">本地 Portal</a>
                <a id="cloud-portal-btn" class="cb-btn cb-btn-secondary" href="#" target="_blank" style="opacity:0.55;pointer-events:none;">云端 Portal</a>
            </div>
        </div>
    </div>

    <div class="cb-section">
        <h2>最近一次检测结果</h2>
        <div class="cb-risk-panel cb-risk-panel-full">
            <div class="cb-risk-indicator-large" id="rc-risk-circle">
                <div class="cb-risk-score-large" id="rc-risk-score">--</div>
                <div class="cb-risk-level" id="rc-risk-level">未检测</div>
            </div>
            <div class="cb-risk-details-full">
                <table class="cb-info-table cb-info-table-full">
                    <thead>
                        <tr><th>检测项</th><th>结果</th></tr>
                    </thead>
                    <tbody>
                        <tr><td>检测时间</td><td id="rc-timestamp">--</td></tr>
                        <tr><td>WAN IP</td><td id="rc-ip">--</td></tr>
                        <tr><td>国家/地区</td><td id="rc-country">--</td></tr>
                        <tr><td>城市</td><td id="rc-city">--</td></tr>
                        <tr><td>ISP</td><td id="rc-isp">--</td></tr>
                        <tr><td>组织</td><td id="rc-org">--</td></tr>
                        <tr><td>ASN</td><td id="rc-asn">--</td></tr>
                        <tr><td>代理特征</td><td id="rc-proxy">--</td></tr>
                        <tr><td>托管 IP</td><td id="rc-hosting">--</td></tr>
                        <tr><td>风险因素</td><td id="rc-factors">--</td></tr>
                        <tr><td>执行动作</td><td id="rc-action-taken">--</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
function setTextById(id, value) {
    var element = document.getElementById(id);
    if (element) {
        element.textContent = (value !== undefined && value !== null && value !== "") ? value : "--";
    }
}

function getRiskLevelText(level) {
    var map = {
        low: "低风险",
        medium: "中风险",
        high: "高风险",
        critical: "严重风险"
    };
    return map[level] || "未知";
}

function readableServiceName(name) {
    if (!name || name === "none") return "未安装";
    if (name === "openclash") return "OpenClash";
    if (name === "passwall") return "Passwall";
    return name;
}

function updateRiskDisplay(data) {
    if (!data) return;

    setTextById("rc-risk-score", data.risk_score !== undefined ? data.risk_score : "--");
    setTextById("rc-risk-level", getRiskLevelText(data.risk_level));
    setTextById("rc-timestamp", data.timestamp);
    setTextById("rc-ip", data.ip);
    setTextById("rc-country", data.country);
    setTextById("rc-city", data.city);
    setTextById("rc-isp", data.isp);
    setTextById("rc-org", data.org);
    setTextById("rc-asn", data.asn);
    setTextById("rc-proxy", data.is_proxy ? "是" : "否");
    setTextById("rc-hosting", data.is_hosting ? "是" : "否");
    setTextById("rc-factors", data.risk_factors || "无");
    setTextById("rc-action-taken", data.action_taken || "无");
    setTextById("rc-interval", data.check_interval);
    setTextById("rc-threshold", data.risk_threshold);
    setTextById("rc-action", data.action);
    setTextById("rc-proxy-service", readableServiceName(data.proxy_service) + " / " + (data.proxy_running ? "运行中" : "未运行"));

    var circle = document.getElementById("rc-risk-circle");
    if (circle && data.risk_level) {
        circle.className = "cb-risk-indicator-large risk-" + data.risk_level;
    }

    var status = document.getElementById("rc-service-status");
    if (status) {
        if (data.service_running) {
            status.textContent = "运行中";
            status.className = "cb-badge cb-badge-success";
        } else {
            status.textContent = "已停止";
            status.className = "cb-badge cb-badge-danger";
        }
    }
}

function refreshStatus() {
    fetch("/cgi-bin/luci/admin/cbshield/api/riskstatus")
        .then(function(response) { return response.json(); })
        .then(function(data) { updateRiskDisplay(data); })
        .catch(function(error) { console.error("failed to fetch risk status:", error); });
}

function manualCheck() {
    var button = document.getElementById("btn-runcheck");
    if (!button) return;

    button.textContent = "检测中...";
    button.disabled = true;

    fetch("/cgi-bin/luci/admin/cbshield/api/runcheck", { method: "POST" })
        .then(function() {
            setTimeout(function() {
                refreshStatus();
                button.textContent = "立即检测";
                button.disabled = false;
            }, 3000);
        })
        .catch(function() {
            button.textContent = "立即检测";
            button.disabled = false;
        });
}

function fetchCloudConfig() {
    var url = "/cb-portal/portal_config.json?t=" + Date.now();
    var button = document.getElementById("cloud-portal-btn");
    if (!button) return;

    fetch(url)
        .then(function(response) { return response.json(); })
        .then(function(data) {
            if (data && data.portal_url) {
                button.href = data.portal_url;
                button.textContent = "云端 Portal";
                button.style.opacity = "1";
                button.style.pointerEvents = "auto";
            }
        })
        .catch(function() {});
}

document.addEventListener("DOMContentLoaded", function() {
    refreshStatus();
    fetchCloudConfig();
});

setInterval(refreshStatus, 30000);
</script>

<%+footer%>
