name: Build CrossBorderShield Q30

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev

      - name: Clone Source
        run: |
          git clone --depth 1 https://github.com/immortalwrt/immortalwrt -b openwrt-23.05 master

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            master/staging_dir
            master/build_dir
            master/dl
          key: ${{ runner.os }}-openwrt-${{ hashFiles('seed.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-

      - name: Update Feeds
        run: |
          chmod +x diy-part1.sh
          cp diy-part1.sh master/
          cd master
          ./diy-part1.sh
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Config & DIY
        run: |
          # 1. 复制你的基础配置（如果存在）
          [ -f "seed.config" ] && cp seed.config master/.config || touch master/.config
          
          # 2. 【核心修复】强制指定 CPU 架构为 MT7981 和设备为 Q30
          cat <<EOF >> master/.config
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_mt7981=y
          CONFIG_TARGET_mediatek_mt7981_DEVICE_jcg_q30=y
          EOF
          
          # 3. 运行你的定制脚本并同步素材
          chmod +x diy-part2.sh
          cp diy-part2.sh master/
          [ -d "images" ] && cp -r images master/
          cd master
          ./diy-part2.sh
          
          # 4. 生成并补全最终配置 (此时系统已明确知道要给 Q30 编译)
          make defconfig

      - name: Download & Compile
        run: |
          cd master
          make download -j8
          make -j$(nproc) || make -j1 V=s

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: CB-Shield-Pro-Firmware
          # 移除后缀限制，抓取 targets 目录下的所有产物，确保拿到 30MB+ 的固件包
          path: master/bin/targets/*/*/*
