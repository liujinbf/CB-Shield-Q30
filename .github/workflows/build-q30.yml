name: Build CrossBorderShield Q30 (Kwrt Core)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev

      - name: Clone Source
        run: |
          # 【核心替换】：直接拉取完美兼容你硬件的 Kwrt 源码
          git clone --depth 1 https://github.com/kiddin9/Kwrt.git master

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            master/staging_dir
            master/build_dir
            master/dl
          # 这是一个全新的源码库，我们需要建立全新的 v1 缓存
          key: ${{ runner.os }}-kwrt-q30-v1-${{ hashFiles('diy-part2.sh') }}
          restore-keys: |
            ${{ runner.os }}-kwrt-q30-v1-

      - name: Update Feeds
        run: |
          chmod +x diy-part1.sh
          cp diy-part1.sh master/
          cd master
          ./diy-part1.sh
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Config & DIY
        run: |
          echo "正在扫描 Kwrt 源码中的 Q30 Pro 专属代号..."
          Q30_PROFILE=$(grep -r -i -h -E '^define[[:space:]]+Device/.*q30' master/target/linux/mediatek/image/ | head -n 1 | awk -F'/' '{print $2}' | tr -d ' \r\n')
          
          if [ -z "$Q30_PROFILE" ]; then
              echo "::error::未在 Kwrt 源码中找到 Q30 配置！"
              exit 1
          fi
          
          echo "::notice::成功锁定 Kwrt 专属设备代号: $Q30_PROFILE"
          
          echo "CONFIG_TARGET_mediatek=y" > master/.config
          echo "CONFIG_TARGET_mediatek_filogic=y" >> master/.config
          echo "CONFIG_TARGET_MULTI_PROFILE=y" >> master/.config
          echo "CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_${Q30_PROFILE}=y" >> master/.config
          
          # 关闭签名
          echo "CONFIG_SIGNED_PACKAGES=n" >> master/.config
          
          rm -rf master/tmp
          
          chmod +x diy-part2.sh
          cp diy-part2.sh master/
          [ -d "images" ] && cp -r images master/
          cd master
          ./diy-part2.sh
          
          make defconfig

      - name: Download & Compile
        run: |
          cd master
          make download -j8
          make -j$(nproc) || make -j1 V=s

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: CB-Shield-Pro-Kwrt-Firmware
          path: master/bin/targets/
