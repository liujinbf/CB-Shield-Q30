name: Build CrossBorderShield Q30 (Hanwckf Core)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev

      - name: Clone Source
        run: |
          # 【核心替换】：拉取 H大 专为 MT7981 优化的闭源驱动级源码库
          git clone --depth 1 https://github.com/hanwckf/immortalwrt-mt798x.git -b openwrt-21.02 master

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            master/staging_dir
            master/build_dir
            master/dl
          key: ${{ runner.os }}-hanwckf-q30-v1-${{ hashFiles('diy-part2.sh') }}
          restore-keys: |
            ${{ runner.os }}-hanwckf-q30-v1-

      - name: Update Feeds
        run: |
          chmod +x diy-part1.sh
          cp diy-part1.sh master/
          cd master
          ./diy-part1.sh
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Config & DIY
        run: |
          # 1. 锁定 H大 源码下的 MT7981 架构
          echo "CONFIG_TARGET_mediatek=y" > master/.config
          echo "CONFIG_TARGET_mediatek_mt7981=y" >> master/.config
          
          # 2. 【无敌模式】：开启全量打包。直接生成该目录下所有支持的路由器固件，绝不落空！
          echo "CONFIG_TARGET_MULTI_PROFILE=y" >> master/.config
          echo "CONFIG_TARGET_ALL_PROFILES=y" >> master/.config
          
          echo "CONFIG_SIGNED_PACKAGES=n" >> master/.config
          
          rm -rf master/tmp
          
          chmod +x diy-part2.sh
          cp diy-part2.sh master/
          [ -d "images" ] && cp -r images master/
          cd master
          ./diy-part2.sh
          
          make defconfig

      - name: Download & Compile
        run: |
          cd master
          make download -j8
          make -j$(nproc) || make -j1 V=s

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: CB-Shield-Pro-Hanwckf-Firmware
          path: master/bin/targets/
