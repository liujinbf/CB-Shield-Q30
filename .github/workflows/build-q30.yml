name: Build CrossBorderShield Q30 Pro (ImageBuilder)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Init Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get -y install build-essential libncurses5-dev libncursesw5-dev \
            zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3

      - name: Download Kiddin9 ImageBuilder
        run: |
          echo "正在下载完美匹配的 MT7981 底层驱动镜像构建器..."
          wget https://dl.openwrt.ai/latest/targets/mediatek/mt7981/openwrt-imagebuilder-mediatek-mt7981.Linux-x86_64.tar.xz
          tar -Jxf openwrt-imagebuilder-mediatek-mt7981.Linux-x86_64.tar.xz
          mv openwrt-imagebuilder-mediatek-mt7981.Linux-x86_64 imagebuilder

      - name: Inject Custom Settings & Security Scripts
        run: |
          cd imagebuilder
          # 创建自定义文件注入目录
          mkdir -p files/etc/uci-defaults
          mkdir -p files/etc/config
          
          # 1. 注入核心配置：首次开机自动将 LAN 口 IP 修改为 192.168.6.1 (防原厂 IP 冲突)
          cat << 'EOF' > files/etc/uci-defaults/99-custom-ip
          #!/bin/sh
          uci set network.lan.ipaddr='192.168.6.1'
          uci commit network
          exit 0
          EOF
          chmod +x files/etc/uci-defaults/99-custom-ip
          
          # 这里可以随时增加其他的防关联配置注入（比如固化 MAC 地址等）

      - name: Build Pure Firmware
        run: |
          cd imagebuilder
          echo "开始极速打包纯净版固件..."
          
          # PACKAGES 参数说明：
          # 带有减号 (-) 的表示从底包中强行剔除这些臃肿插件，保证系统极度纯净稳定
          # PROFILE="jcg_q30-pro" 精准锁定硬件代号
          make image PROFILE="jcg_q30-pro" \
            PACKAGES="-luci-app-docker -dockerd -docker -luci-app-dockerman \
            -luci-app-adguardhome -luci-app-unblockneteasemusic \
            -luci-app-qbittorrent -luci-app-transmission" \
            FILES="files"

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CB-Shield-Q30-Pro-Pure-Firmware
          path: imagebuilder/bin/targets/mediatek/mt7981/*sysupgrade.bin
