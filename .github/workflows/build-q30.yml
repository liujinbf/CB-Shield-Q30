name: Build CrossBorderShield Q30

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev

      - name: Clone Source
        run: |
          git clone --depth 1 https://github.com/immortalwrt/immortalwrt -b openwrt-23.05 master

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            master/staging_dir
            master/build_dir
            master/dl
          # 更换缓存 Key 为 v3，强制系统抛弃所有旧的香蕉派缓存
          key: ${{ runner.os }}-openwrt-q30-v3-${{ hashFiles('diy-part2.sh') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-q30-v3-

      - name: Update Feeds
        run: |
          chmod +x diy-part1.sh
          cp diy-part1.sh master/
          cd master
          ./diy-part1.sh
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Config & DIY
        run: |
          # 【核心修复 1】：使用官方源码中真实的设备代号 jcg_q30_pro
          echo "CONFIG_TARGET_mediatek=y" > master/.config
          echo "CONFIG_TARGET_mediatek_filogic=y" >> master/.config
          echo "CONFIG_TARGET_mediatek_filogic_DEVICE_jcg_q30_pro=y" >> master/.config
          
          rm -rf master/tmp
          
          chmod +x diy-part2.sh
          cp diy-part2.sh master/
          [ -d "images" ] && cp -r images master/
          cd master
          ./diy-part2.sh
          
          make defconfig

      - name: Download & Compile
        run: |
          cd master
          make download -j8
          make -j$(nproc) || make -j1 V=s

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: CB-Shield-Pro-Firmware
          # 【核心修复 2】：使用 *sysupgrade.* 兼容 .itb 后缀的固件
          path: master/bin/targets/*/*/*sysupgrade.*
