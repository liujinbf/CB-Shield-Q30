name: Build Stable Firmware

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: 'Upload to GitHub Release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: build-stable-${{ github.ref }}
  cancel-in-progress: false

env:
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: openwrt-25.12
  TZ: Asia/Shanghai
  PROFILE: stable

jobs:
  build-stable:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Build Dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y ca-certificates gpg wget
          test -f /usr/share/doc/kitware-archive-keyring/copyright || \
            wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | gpg --dearmor - | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/kitware.list >/dev/null
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler \
            ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev \
            gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev \
            libtool lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full \
            patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils \
            rsync scons squashfs-tools subversion swig texinfo uglifyjs unzip upx-ucl \
            vim wget xmlto xxd zlib1g-dev zstd
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown "$USER:$USER" /workdir

      - name: Repository Smoke Test
        run: |
          bash scripts/ci-smoke.sh "$GITHUB_WORKSPACE"

      - name: Clone OpenWrt
        working-directory: /workdir
        run: |
          git clone --depth 1 "$REPO_URL" -b "$REPO_BRANCH" openwrt
          ln -sf /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"

      - name: Cache Download and Toolchain
        uses: actions/cache@v4
        with:
          path: |
            /workdir/openwrt/dl
            /workdir/openwrt/.ccache
            /workdir/openwrt/staging_dir/host
            /workdir/openwrt/staging_dir/hostpkg
            /workdir/openwrt/staging_dir/toolchain-*
          key: ${{ runner.os }}-${{ env.PROFILE }}-${{ hashFiles('.config', 'profiles/stable.config', 'feeds.conf.default', 'scripts/diy-part1.sh', 'scripts/diy-part2.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.PROFILE }}-

      - name: Prepare OpenWrt Tree
        run: |
          bash scripts/prepare-openwrt.sh /workdir/openwrt "$PROFILE"

      - name: Compile Custom Packages First
        run: bash scripts/package-preflight.sh /workdir/openwrt

      - name: Download Sources
        run: |
          cd /workdir/openwrt
          make download -j"$(nproc)"
          find dl -size -1024c -delete

      - name: Build Firmware
        run: |
          cd /workdir/openwrt
          export CCACHE_DIR=/workdir/openwrt/.ccache
          export PATH="/usr/lib/ccache:$PATH"
          make -j"$(nproc)" || make -j1 V=s

      - name: Collect Stable Artifacts
        run: |
          OUT_DIR="$GITHUB_WORKSPACE/artifacts/stable"
          TARGET_DIR="$(find /workdir/openwrt/bin/targets -mindepth 2 -maxdepth 2 -type d | head -n1)"
          rm -rf "$OUT_DIR"
          mkdir -p "$OUT_DIR"
          find "$TARGET_DIR" -maxdepth 1 -type f \( -iname "*q30*factory*.bin" -o -iname "*q30*sysupgrade*.bin" \) -exec cp -f {} "$OUT_DIR/" \;
          find "$TARGET_DIR" -maxdepth 1 -type f -name "*.manifest" -exec cp -f {} "$OUT_DIR/" \;
          cd "$OUT_DIR"
          if ! ls *.bin >/dev/null 2>&1; then
            echo "collect failed: no q30 firmware images found under $TARGET_DIR"
            find "$TARGET_DIR" -maxdepth 1 -type f -printf '%f\n' | sort
            exit 1
          fi
          if ! ls *.manifest >/dev/null 2>&1; then
            echo "collect failed: no manifest found under $TARGET_DIR"
            find "$TARGET_DIR" -maxdepth 1 -type f -printf '%f\n' | sort
            exit 1
          fi
          ls *.manifest >/dev/null
          grep -q '^cb-riskcontrol ' *.manifest
          grep -q '^luci-theme-cbshield ' *.manifest
          grep -q '^kmod-mt7915e ' *.manifest
          factory_image="$(ls *factory*.bin | head -n1)"
          factory_size="$(stat -c '%s' "$factory_image")"
          if [ "$factory_size" -lt 60000000 ]; then
            echo "collect failed: factory image too small for q30 recovery compatibility: $factory_image ($factory_size bytes)"
            exit 1
          fi
          sha256sum *.bin > SHA256SUMS

      - name: Upload Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: CB-Shield-Q30-stable-${{ github.sha }}
          path: artifacts/stable

      - name: Upload Release
        if: ${{ inputs.upload_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable-${{ github.run_number }}
          files: artifacts/stable/*
          body: |
            Stable firmware for JCG Q30 PRO.
            Profile: stable
            Commit: ${{ github.sha }}

      - name: Cleanup
        if: always()
        run: rm -rf /workdir/openwrt
