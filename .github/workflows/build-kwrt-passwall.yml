name: Build Kwrt Passwall Firmware

on:
  push:
    branches:
      - codex/kwrt-passwall-firmware
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-kwrt-passwall:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      REPO_DIR: ${{ github.workspace }}
      WORKDIR_ROOT: ${{ github.workspace }}/.workdir
      OPENWRT_DIR: ${{ github.workspace }}/.workdir/openwrt
      REPO_URL: https://github.com/openwrt/openwrt.git
      REPO_BRANCH: openwrt-25.12
      TARGET_NAME: mediatek_filogic

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Firmware
        run: |
          chmod +x scripts/build-kwrt-passwall-in-docker.sh
          bash -x scripts/build-kwrt-passwall-in-docker.sh build

      - name: Dump Build Log
        if: failure()
        run: |
          if [ -f logs/build-kwrt-passwall-docker.log ]; then
            tail -n 200 logs/build-kwrt-passwall-docker.log
          else
            echo "build log missing"
          fi

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: CB-Shield-Q30-kwrt-passwall-${{ github.sha }}
          path: |
            artifacts/kwrt-passwall-firmware
            logs/build-kwrt-passwall-docker.log
